<section class="reservas-page">
  <h1>RESERVAS</h1>

  <div class="reservas-box">
    
    <div class="calendario">
      <input type="date">
    </div>

    <form class="form-reservas">

      <!-- NUEVOS CAMPOS OBLIGATORIOS -->
      <label>Nombre</label>
      <input type="text" placeholder="Tu nombre" required>

      <label>Email</label>
      <input type="email" placeholder="tuemail@email.com" required>

      <label>Comentarios</label>
      <textarea placeholder="Alguna indicación especial..." rows="3"></textarea>

      <label>
        <input type="checkbox" required> Acepto las condiciones de la reserva
      </label>

      <!-- CAMPOS QUE YA TENÍAS -->
      <label>Personas</label>
      <select>
        <option>2 personas</option>
        <option>3 personas</option>
        <option>4 personas</option>
        <option>5 personas</option>
        <option>6 personas</option>
      </select>

      <label>Hora</label>
      <select>
        <option>Seleccione</option>
        <option>20:00</option>
        <option>20:30</option>
        <option>21:00</option>
        <option>21:30</option>
        <option>22:00</option>
      </select>

      <label>Zona</label>
      <select>
        <option>Seleccione la zona</option>
        <option>Sala principal</option>
        <option>Terraza</option>
        <option>Zona lounge</option>
      </select>

      <button type="submit">Reservar</button>
      <button type="button" class="espera">Lista de espera</button>
    </form>

  </div>
</section>
